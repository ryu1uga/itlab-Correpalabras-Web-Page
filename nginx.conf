# Configuración Global
pid /var/run/nginx.pid;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    # CONFIGURACIÓN CRÍTICA PARA NON-ROOT / OPENSHIFT
    # Movemos todas las cachés temporales a /tmp que tiene permisos globales de escritura
    client_body_temp_path /tmp/client_body_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Tu configuración del Servidor para la SPA de React
    server {
        listen 3000;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Evitar exponer info del servidor
        server_tokens off;

        # Necesario para React Router (Vite) — todo redirige al index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache para assets estáticos generados por Vite
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}